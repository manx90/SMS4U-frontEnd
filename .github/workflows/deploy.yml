name: Deploy to Production Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Build project
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://api.sms4u.pro/api/v1' }}

      - name: Prepare server and backup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Create deployment directory if it doesn't exist
            mkdir -p ${{ secrets.DEPLOY_PATH }}/dist
            
            # Backup current deployment if exists
            if [ -d "${{ secrets.DEPLOY_PATH }}/dist" ] && [ "$(ls -A ${{ secrets.DEPLOY_PATH }}/dist)" ]; then
              BACKUP_DIR="${{ secrets.DEPLOY_PATH }}/dist.backup.$(date +%Y%m%d_%H%M%S)"
              cp -r ${{ secrets.DEPLOY_PATH }}/dist $BACKUP_DIR
              echo "✅ Backup created: $BACKUP_DIR"
            fi
            
            # Remove old backups (keep last 3)
            cd ${{ secrets.DEPLOY_PATH }}
            if [ -d "dist.backup.*" ]; then
              ls -dt dist.backup.* 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true
            fi

      - name: Deploy to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "dist/*"
          target: ${{ secrets.DEPLOY_PATH }}/dist
          strip_components: 1
          rm: false
          overwrite: true

      - name: Restart web server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Set proper permissions
            chmod -R 755 ${{ secrets.DEPLOY_PATH }}/dist
            
            # Restart nginx if exists
            if command -v nginx &> /dev/null; then
              sudo systemctl reload nginx 2>/dev/null || sudo service nginx reload 2>/dev/null || true
              echo "✅ Nginx reloaded"
            fi
            
            # Restart apache if exists
            if command -v apache2 &> /dev/null; then
              sudo systemctl reload apache2 2>/dev/null || sudo service apache2 reload 2>/dev/null || true
              echo "✅ Apache reloaded"
            fi
            
            echo "✅ Deployment completed on server"

      - name: Deployment Success
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Server: ${{ secrets.SERVER_HOST }}"
          echo "📁 Path: ${{ secrets.DEPLOY_PATH }}"

